<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレーン力学可視化シミュレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap');
  :root {
    --bg:#0a0c10; --panel:#111520; --border:#1e2a3a;
    --accent:#00e5ff; --warn:#ff6b35; --good:#39ff14;
    --torq:#ff4081; --grip:#448aff; --text:#c8d6e5; --dim:#4a5568;
  }
  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    font-family:'Noto Sans JP',sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:12px;gap:12px;
  }

  h1{
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(13px,3vw,18px);
    color:var(--accent);letter-spacing:2px;text-transform:uppercase;
    border-bottom:1px solid var(--border);padding-bottom:8px;
    width:100%;text-align:center;
  }

  /* ── レイアウト ─────────────────── */
  .layout{
    display:flex;gap:12px;width:100%;
    align-items:flex-start;
    /* PCは横並び、スマホは縦1列 */
    flex-direction:row;
  }

  #canvas-wrap{
    position:relative;
    flex:1;
    min-width:0; /* flexで潰れないように */
  }

  canvas{
    display:block;background:#080b12;
    border:1px solid var(--border);border-radius:4px;
    cursor:crosshair;
    width:100%;   /* 親に合わせてリサイズ */
    height:auto;
    touch-action:none;
  }

  .side-panel{
    width:200px;
    flex-shrink:0;
    display:flex;flex-direction:column;gap:8px;
  }

  /* ── カード ────────────────────── */
  .card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:6px;padding:10px;
  }
  .card-title{
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(9px,2vw,11px);
    color:var(--accent);letter-spacing:2px;
    margin-bottom:8px;text-transform:uppercase;
  }

  .setting-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:8px;font-size:clamp(11px,2.5vw,13px);gap:8px;
  }
  .setting-row:last-child{margin-bottom:0;}
  .setting-label{color:var(--dim);white-space:nowrap;flex-shrink:0;}

  input[type="range"]{
    -webkit-appearance:none;flex:1;min-width:0;
    height:6px;background:var(--border);border-radius:3px;outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px;height:18px; /* タッチしやすいサイズ */
    background:var(--accent);border-radius:50%;cursor:pointer;
  }

  .value-display{
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(10px,2vw,12px);color:var(--accent);
    min-width:38px;text-align:right;flex-shrink:0;
  }

  select{
    background:#1a2030;color:var(--text);border:1px solid var(--border);
    padding:5px 6px;font-size:clamp(11px,2.5vw,13px);
    border-radius:3px;width:100%;margin-top:2px;
  }

  /* ── 物理パネル ─────────────────── */
  .phys-row{
    display:flex;justify-content:space-between;
    font-size:clamp(10px,2vw,12px);
    margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border);
  }
  .phys-row:last-child{border-bottom:none;margin-bottom:0;}
  .phys-name{color:var(--dim);}
  .phys-val{font-family:'Share Tech Mono',monospace;}
  .val-good{color:var(--good);}.val-warn{color:var(--warn);}.val-danger{color:var(--torq);}

  /* ── 結果バー ─────────────────── */
  .result-bar{
    height:32px;border-radius:4px;display:flex;align-items:center;
    justify-content:center;font-family:'Share Tech Mono',monospace;
    font-size:clamp(12px,2.5vw,14px);
    font-weight:bold;letter-spacing:2px;transition:background .3s;margin-bottom:7px;
  }

  /* ── 凡例 ─────────────────────── */
  .legend{display:flex;flex-direction:column;gap:6px;}
  .legend-row{display:flex;align-items:center;gap:6px;font-size:clamp(10px,2vw,12px);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .legend-line{width:22px;height:3px;flex-shrink:0;}

  /* ── ボタン ─────────────────────── */
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  button{
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(13px,3vw,15px);
    letter-spacing:1px;
    padding:10px 22px;
    border:1px solid;border-radius:4px;cursor:pointer;
    background:transparent;transition:all .15s;
    min-width:90px;
    -webkit-tap-highlight-color:transparent;
  }
  #btn-start{color:var(--good);border-color:var(--good);}
  #btn-start:hover,#btn-start:active{background:var(--good);color:#000;}
  #btn-start:disabled{opacity:.3;cursor:not-allowed;}
  #btn-reset{color:var(--warn);border-color:var(--warn);}
  #btn-reset:hover,#btn-reset:active{background:var(--warn);color:#fff;}

  .hint{
    font-size:clamp(9px,2vw,11px);color:var(--dim);
    text-align:center;font-family:'Share Tech Mono',monospace;margin-top:6px;
  }
  kbd{background:var(--border);padding:1px 5px;border-radius:3px;}
  .divider{height:1px;background:var(--border);margin:6px 0;}

  /* ── スマホ縦1列レイアウト ──────── */
  @media (max-width: 640px){
    body{padding:8px;gap:8px;}
    .layout{flex-direction:column;}
    .side-panel{
      width:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    /* ARM / ITEM は2列に並べる、PHYSICS・RESULT・LEGENDも均等に */
    .card{padding:10px;}
  }
</style>
</head>
<body>
<h1>CRANE PHYSICS VISUALIZER</h1>

<div class="layout">
  <div id="canvas-wrap">
    <canvas id="sim" width="600" height="520"></canvas>
    <div class="controls">
      <button id="btn-start">&#9654; START</button>
      <button id="btn-reset">&#8634; RESET</button>
    </div>
    <p class="hint">
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> アーム移動 &nbsp;|&nbsp; キャンバスクリックで狙い位置指定
    </p>
  </div>

  <div class="side-panel">
    <div class="card">
      <div class="card-title">ARM SETTINGS</div>
      <div class="setting-row">
        <span class="setting-label">アーム強度</span>
        <input type="range" id="sl-power" min="1" max="10" value="5">
        <span class="value-display" id="disp-power">5</span>
      </div>
      <div class="setting-row">
        <span class="setting-label">狙いX位置</span>
        <input type="range" id="sl-aimx" min="-1" max="1" step="0.05" value="0.4">
        <span class="value-display" id="disp-aimx">+0.40</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ITEM SETTINGS</div>
      <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
        <span class="setting-label">プリセット</span>
        <select id="sel-shape">
          <option value="custom">カスタム</option>
          <option value="square">正方形 (小・軽)</option>
          <option value="rect_h" selected>横長ぬいぐるみ</option>
          <option value="rect_v">縦長フィギュア</option>
          <option value="heavy">超重量景品</option>
        </select>
      </div>
      <div class="divider"></div>
      <div class="setting-row">
        <span class="setting-label">幅 px</span>
        <input type="range" id="sl-iw" min="40" max="180" value="130">
        <span class="value-display" id="disp-iw">130</span>
      </div>
      <div class="setting-row">
        <span class="setting-label">高さ px</span>
        <input type="range" id="sl-ih" min="40" max="160" value="60">
        <span class="value-display" id="disp-ih">60</span>
      </div>
      <div class="setting-row">
        <span class="setting-label">質量 kg</span>
        <input type="range" id="sl-mass" min="0.1" max="1.0" step="0.1" value="0.4">
        <span class="value-display" id="disp-mass">0.4</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">PHYSICS</div>
      <div class="phys-row"><span class="phys-name">把持力 F</span><span class="phys-val" id="p-grip">-</span></div>
      <div class="phys-row"><span class="phys-name">重力 W</span><span class="phys-val" id="p-weight">-</span></div>
      <div class="phys-row"><span class="phys-name">重心ずれ d</span><span class="phys-val" id="p-offset">-</span></div>
      <div class="phys-row"><span class="phys-name">転倒 &tau;</span><span class="phys-val" id="p-torque">-</span></div>
      <div class="phys-row"><span class="phys-name">把持 &tau;</span><span class="phys-val" id="p-grip-torque">-</span></div>
    </div>

    <div class="card">
      <div class="card-title">RESULT</div>
      <div id="result-bar" class="result-bar" style="background:#1a2030;color:var(--dim);">---</div>
      <div id="result-detail" style="font-size:10px;color:var(--dim);text-align:center;
        line-height:1.6;white-space:pre-line;">シミュレーション待機中</div>
    </div>

    <div class="card">
      <div class="card-title">LEGEND</div>
      <div class="legend">
        <div class="legend-row"><div class="legend-line" style="background:#ffd600;"></div><span>重力 W</span></div>
        <div class="legend-row"><div class="legend-line" style="background:#448aff;"></div><span>把持力 F</span></div>
        <div class="legend-row"><div class="legend-line" style="background:#ff4081;"></div><span>転倒トルク &tau;</span></div>
        <div class="legend-row"><div class="legend-dot" style="background:#ffd600;border:1px solid #fff;"></div><span>重心 CoM</span></div>
        <div class="legend-row"><div class="legend-dot" style="background:#448aff;border:1px solid #fff;"></div><span>把持点</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const CW = canvas.width, CH = canvas.height;
const FLOOR_Y = CH - 50;
const RAIL_Y = 28;

// =====================================================================
// STATE
// =====================================================================
let state = {
  phase: 'idle',  // idle|descend|grip|lift|release|fall|done
  armX: 300,
  shaftLen: 80,
  clawAngle: 15,  // deg — ツメ開き角
  power: 5,
  itemX: 300, itemY: 0,
  itemAngle: 0,   // deg
  velAngle: 0,    // deg/frame
  velY: 0,        // px/frame（落下速度）
  velX: 0,        // px/frame（横方向速度）
  isPivot: false, // ピボット（接地傾き）フェーズか
  aimOffset: 0.4,
  iw: 130, ih: 60, mass: 0.4,
  liftedY: 0,     // 持ち上げ完了時のY座標
};
state.itemY = FLOOR_Y - state.ih / 2;

// =====================================================================
// 物理計算
// =====================================================================
function getGrip()       { return state.power * 3; }          // N (1〜30N)
function getWeight()     { return state.mass * 9.8; }         // N
function getGripX()      { return state.itemX + state.aimOffset * state.iw * 0.5; }
// 転倒トルク: W × d (dはpx→m換算 1px=0.005m想定)
function getTorque()     { return getWeight() * Math.abs(getGripX() - state.itemX) * 0.005; }
// 把持トルク: F × 腕の長さ(= アイテム高さ/2)
function getGripTorque() { return getGrip() * (state.ih * 0.5) * 0.005; }

// ツメの見た目パラメータ（アーム強度に連動）
function getClawVisual() {
  const p = state.power;
  return {
    width:  4 + p * 0.8,          // ツメの太さ 4〜12px
    length: 40 + p * 5,           // ツメの長さ 45〜90px
    offset: 6 + p * 0.6,          // ツメの横間隔
    headW:  24 + p * 3,           // ヘッドプレートの幅
  };
}

// =====================================================================
// 描画ユーティリティ
// =====================================================================

/** 直線矢印 */
function arrow(x1,y1,x2,y2,color,lw,label,labelRight){
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  if(len<2) return;
  const ang=Math.atan2(dy,dx);
  ctx.save();
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lw;
  ctx.shadowColor=color; ctx.shadowBlur=7;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.save();
  ctx.translate(x2,y2); ctx.rotate(ang);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-11,-5); ctx.lineTo(-11,5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  if(label){
    ctx.font='11px "Share Tech Mono"'; ctx.shadowBlur=0;
    if(labelRight){ ctx.textAlign='left';  ctx.fillText(label,x2+8,y2-4); }
    else          { ctx.textAlign='right'; ctx.fillText(label,x2-8,y2-4); }
  }
  ctx.restore();
}

/**
 * 弧の矢印 — 回転方向を正しく示す
 * clockwise=true  → 時計回り（右に倒れる）
 * clockwise=false → 反時計回り（左に倒れる）
 */
function arcArrow(cx,cy,r,clockwise,color,label){
  // 弧の範囲: 常に右上〜右下あたりを使い、向きで反転
  // 反時計回り: 約 20°→ 340°逆向きに描く = arc(start=340°, end=20°, ccw)
  //   つまり ctx.arc(cx,cy,r, startRad, endRad, counterClockwise=true)
  // 時計回り:   約 200°→ 160°(下半分) ctx.arc(cx,cy,r, 200°, 160°, false) 辺り

  // シンプルに: 時計→下半分を右向きに、反時計→下半分を左向きに
  const DEG = Math.PI/180;
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=3; ctx.shadowColor=color; ctx.shadowBlur=10;
  ctx.setLineDash([]);

  let a1, a2, ccw;
  if(clockwise){
    // 時計回り: 左下から右下へ（下の半弧）
    a1 = 150*DEG;  // 左斜め下
    a2 = 30*DEG;   // 右斜め上
    ccw = false;   // 時計回り描画
  } else {
    // 反時計回り: 右下から左下へ
    a1 = 30*DEG;
    a2 = 150*DEG;
    ccw = true;    // 反時計回り描画
  }

  ctx.beginPath();
  ctx.arc(cx, cy, r, a1, a2, ccw);
  ctx.stroke();

  // 矢頭を弧の終点に接線方向で描く
  const tipAngle = a2;
  const tx = cx + r * Math.cos(tipAngle);
  const ty = cy + r * Math.sin(tipAngle);
  // 接線方向: 時計→ tipAngle+90°、反時計→ tipAngle-90°
  const headDir = ccw ? tipAngle - Math.PI/2 : tipAngle + Math.PI/2;
  ctx.save();
  ctx.translate(tx,ty); ctx.rotate(headDir);
  ctx.fillStyle=color; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-8,-15); ctx.lineTo(8,-15);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  if(label){
    ctx.font='bold 12px "Share Tech Mono"';
    ctx.fillStyle=color; ctx.shadowBlur=0; ctx.textAlign='left';
    ctx.fillText(label, cx+r+8, cy+4);
  }
  ctx.restore();
}

// =====================================================================
// 景品描画
// =====================================================================
function drawItem(){
  ctx.save();
  ctx.translate(state.itemX, state.itemY);
  ctx.rotate(state.itemAngle*Math.PI/180);
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=18; ctx.shadowOffsetY=6;
  const g=ctx.createLinearGradient(-state.iw/2,-state.ih/2,state.iw/2,state.ih/2);
  g.addColorStop(0,'#c0392b'); g.addColorStop(0.5,'#e74c3c'); g.addColorStop(1,'#922b21');
  ctx.fillStyle=g; ctx.strokeStyle='#7b241c'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.roundRect(-state.iw/2,-state.ih/2,state.iw,state.ih,5);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  for(let x=-state.iw/2+20;x<state.iw/2;x+=20){
    ctx.beginPath(); ctx.moveTo(x,-state.ih/2); ctx.lineTo(x,state.ih/2); ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.font=`bold ${Math.min(14,state.iw/7)}px "Share Tech Mono"`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(state.mass.toFixed(1)+'kg', 0, 0);
  ctx.restore();
}

// =====================================================================
// 景品側の力ベクトル（重力・トルク矢印）
// =====================================================================
function drawItemForces(){
  const comX=state.itemX, comY=state.itemY;
  const gpX=getGripX();
  const gpY=state.itemY - state.ih/2;

  // 重心マーカー
  ctx.save();
  ctx.fillStyle='#ffd600'; ctx.shadowColor='#ffd600'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(comX,comY,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();

  // 重力矢印（重心から下）
  const wLen = Math.max(28, getWeight()*3.5);
  arrow(comX, comY, comX, comY+wLen, '#ffd600', 4, `W=${getWeight().toFixed(2)}N`, true);

  const isActive = ['grip','lift','slip','release','fall'].includes(state.phase);
  if(!isActive) return;

  // 把持点マーカー
  ctx.save();
  ctx.fillStyle='#448aff'; ctx.shadowColor='#448aff'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(gpX,gpY,6,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 重心〜把持点の点線
  const d = gpX - comX;  // 正→把持点が右
  ctx.save();
  ctx.strokeStyle='rgba(255,64,129,0.6)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(comX,comY); ctx.lineTo(gpX,gpY); ctx.stroke();
  ctx.restore();

  // d寸法ライン
  const lineY = state.itemY + state.ih/2 + 20;
  ctx.save();
  ctx.strokeStyle='rgba(255,64,129,0.65)'; ctx.lineWidth=1; ctx.setLineDash([2,3]);
  ctx.beginPath(); ctx.moveTo(comX,lineY); ctx.lineTo(gpX,lineY); ctx.stroke();
  [comX,gpX].forEach(x=>{
    ctx.beginPath(); ctx.moveTo(x,lineY-6); ctx.lineTo(x,lineY+6); ctx.stroke();
  });
  ctx.setLineDash([]);
  ctx.fillStyle='#ff4081'; ctx.font='10px "Share Tech Mono"';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('d='+Math.abs(d).toFixed(0)+'px',(comX+gpX)/2,lineY+3);
  ctx.restore();

  // ----------------------------------------------------------------
  // トルク弧矢印 — 物理的に正しい方向
  //
  // 把持点で吊るしたとき重心はどちらに倒れるか:
  //   把持点が重心の右 (d>0) → 重心は把持点より左にある
  //     → 重力が左下に働く → 景品は「左」に倒れる → 反時計回り
  //   把持点が重心の左 (d<0) → 重心は把持点より右にある
  //     → 重力が右下に働く → 景品は「右」に倒れる → 時計回り
  // ----------------------------------------------------------------
  const torq = getTorque();
  if(torq > 0.003 && Math.abs(d) > 4){
    const r = Math.min(52, state.iw * 0.33);
    if(d > 0){
      arcArrow(comX, comY, r, false, '#ff4081', `τ=${torq.toFixed(3)}`);
    } else {
      arcArrow(comX, comY, r, true,  '#ff4081', `τ=${torq.toFixed(3)}`);
    }
  }

  // ── ピボット時：支点（接地側の角）を強調表示 ──
  // 景品が地面についたまま傾く場合、回転の支点となる底面の角を示す
  if(state.isPivot && state.phase === 'lift'){
    const rad = state.itemAngle * Math.PI / 180;
    // 傾き方向によって支点は底面の右端か左端
    // d>0(把持点右)→景品は左回転→支点は底面左端、d<0→支点は底面右端
    const pivotSign = d > 0 ? -1 : 1;
    // 景品の底面の端（回転前の座標系で計算）
    const pivotLocalX = pivotSign * state.iw / 2;
    const pivotLocalY = state.ih / 2;
    // ワールド座標に変換
    const pvX = comX + pivotLocalX * Math.cos(rad) - pivotLocalY * Math.sin(rad);
    const pvY = comY + pivotLocalX * Math.sin(rad) + pivotLocalY * Math.cos(rad);

    ctx.save();
    ctx.fillStyle = '#ff9800';
    ctx.shadowColor = '#ff9800'; ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.arc(pvX, pvY, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff9800';
    ctx.font = '10px "Share Tech Mono"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('PIVOT', pvX, pvY - 12);
    ctx.restore();
  }
}

// =====================================================================
// アーム描画（把持力矢印はここに統合 = アームと一体で動く）
// =====================================================================
function drawArm(){
  const ax = state.armX;
  const cv = getClawVisual();
  const headY = RAIL_Y + state.shaftLen;
  const ang = state.clawAngle * Math.PI/180;

  // --- レール ---
  ctx.save();
  const rg=ctx.createLinearGradient(0,RAIL_Y,0,RAIL_Y+20);
  rg.addColorStop(0,'#1e2a3a'); rg.addColorStop(1,'#2d3f55');
  ctx.fillStyle=rg; ctx.fillRect(0,RAIL_Y,CW,20);
  ctx.fillStyle='#3a5068';
  ctx.fillRect(ax-cv.headW/2-4, RAIL_Y, cv.headW+8, 20);
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=1;
  ctx.strokeRect(ax-cv.headW/2-4, RAIL_Y, cv.headW+8, 20);
  ctx.restore();

  // --- シャフト（強度が上がるほど太く明るく）---
  const shaftW = 3 + state.power * 0.3;
  ctx.save();
  const sg=ctx.createLinearGradient(ax-shaftW,0,ax+shaftW,0);
  sg.addColorStop(0,'#445'); sg.addColorStop(0.5,'#aab'); sg.addColorStop(1,'#445');
  ctx.fillStyle=sg; ctx.shadowColor='rgba(0,200,255,0.2)'; ctx.shadowBlur=8;
  ctx.fillRect(ax-shaftW/2, RAIL_Y+20, shaftW, state.shaftLen-20);
  ctx.restore();

  // --- ツメ左右（強度に応じて太さ・長さが変わる）---
  [
    { bx: ax - cv.offset, rotSign: -1 },
    { bx: ax + cv.offset, rotSign:  1 },
  ].forEach(({bx,rotSign})=>{
    ctx.save();
    ctx.translate(bx, headY);
    ctx.rotate(rotSign * ang);
    // 強度が高いほど金属感のある色
    const brightness = 80 + state.power * 8;
    const cg=ctx.createLinearGradient(0,0,0,cv.length);
    cg.addColorStop(0,`hsl(210,20%,${brightness}%)`);
    cg.addColorStop(1,`hsl(210,30%,${Math.max(20,brightness-40)}%)`);
    ctx.fillStyle=cg;
    ctx.strokeStyle=`hsl(200,30%,${brightness-20}%)`; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.roundRect(-cv.width/2, 0, cv.width, cv.length, 3);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  });

  // --- ヘッドプレート ---
  ctx.save();
  ctx.fillStyle='#2c3e50';
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=1.5;
  ctx.fillRect(ax-cv.headW/2, headY-7, cv.headW, 14);
  ctx.strokeRect(ax-cv.headW/2, headY-7, cv.headW, 14);
  ctx.restore();

  // =================================================================
  // 把持力矢印 — ツメ先の位置に表示、アームと一体で移動
  // 矢印の長さ・太さはアーム強度に連動
  // =================================================================
  const gripForce = getGrip();
  const fLen = 15 + gripForce * 1.8;   // 強度1→18px、強度10→33px
  const arrowY = headY + cv.length * 0.6;
  const arrowLW = 2 + state.power * 0.25;
  const alpha = state.phase === 'idle' ? 0.35 : 1.0;

  ctx.save();
  ctx.globalAlpha = alpha;
  // 左矢印 → （左外から内へ）
  arrow(ax - cv.offset - fLen, arrowY, ax - cv.offset, arrowY, '#448aff', arrowLW, '', false);
  // 右矢印 ← （右外から内へ）
  arrow(ax + cv.offset + fLen, arrowY, ax + cv.offset, arrowY, '#448aff', arrowLW, '', false);
  // ラベル（中央上）
  ctx.fillStyle='#448aff'; ctx.font=`bold ${9+state.power*0.3|0}px "Share Tech Mono"`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.shadowColor='#448aff'; ctx.shadowBlur=6;
  ctx.fillText('F='+gripForce+'N', ax, arrowY-6);
  ctx.restore();
}

// =====================================================================
// 補助描画
// =====================================================================
function drawFloor(){
  ctx.save();
  ctx.fillStyle='#0d1117'; ctx.fillRect(0,FLOOR_Y,CW,CH-FLOOR_Y);
  ctx.strokeStyle='#1e3a2a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,FLOOR_Y); ctx.lineTo(CW,FLOOR_Y); ctx.stroke();
  ctx.strokeStyle='#0f2020'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,FLOOR_Y);ctx.lineTo(x,CH);ctx.stroke();}
  ctx.restore();
}
function drawGrid(){
  ctx.save();
  ctx.strokeStyle='#0e1520'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,42);ctx.lineTo(x,FLOOR_Y);ctx.stroke();}
  for(let y=42;y<FLOOR_Y;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  ctx.restore();
}
function drawPhaseLabel(){
  ctx.save();
  ctx.fillStyle='rgba(0,229,255,0.6)'; ctx.font='11px "Share Tech Mono"';
  ctx.textBaseline='top'; ctx.textAlign='left';
  const L={idle:'STANDBY',descend:'DESCENDING',grip:'GRIPPING',
           lift:'LIFTING',slip:'SLIP!',release:'RELEASING',fall:'FALLING',done:'DONE'};
  ctx.fillText('PHASE: '+(L[state.phase]||state.phase), 10, 55);
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,CW,CH);
  drawGrid(); drawFloor();
  drawItem();
  drawItemForces();
  drawArm();
  drawPhaseLabel();
  updatePhysicsDisplay();
}

// =====================================================================
// PHYSICS PANEL
// =====================================================================
function updatePhysicsDisplay(){
  const grip=getGrip(), weight=getWeight();
  const d=(getGripX()-state.itemX)*0.005;
  const torque=getTorque(), gt=getGripTorque();
  const ratio=torque/(gt+0.0001);
  document.getElementById('p-grip').textContent=grip+' N';
  document.getElementById('p-weight').textContent=weight.toFixed(3)+' N';
  document.getElementById('p-offset').textContent=(d>=0?'+':'')+d.toFixed(3)+' m';
  document.getElementById('p-torque').textContent=torque.toFixed(4)+' N\u00b7m';
  document.getElementById('p-torque').className='phys-val '+(ratio>1.0?'val-danger':ratio>0.5?'val-warn':'val-good');
  document.getElementById('p-grip-torque').textContent=gt.toFixed(4)+' N\u00b7m';
}

// =====================================================================
// SIMULATION LOOP
// =====================================================================
let simTimer=null, tick=0;

function resetState(){
  if(simTimer){ clearInterval(simTimer); simTimer=null; }
  tick=0;
  state.phase='idle';
  state.shaftLen=80;
  state.clawAngle=15;
  state.armX=getGripX();
  state.itemAngle=0; state.velAngle=0; state.velY=0; state.velX=0; state.isPivot=false;
  state.itemX=CW/2;
  state.itemY=FLOOR_Y-state.ih/2;
  document.getElementById('btn-start').disabled=false;
  render();
}

function startSim(){
  if(state.phase!=='idle') return;
  resetState();
  state.phase='descend';
  state.clawAngle=30;
  document.getElementById('btn-start').disabled=true;
  simTimer=setInterval(()=>{ tick++; simStep(); render(); }, 28);
}

function simStep(){
  const torque=getTorque(), gt=getGripTorque();
  const ratio=torque/(gt+0.0001);
  const d=getGripX()-state.itemX;  // 正→把持点が右
  // スリップ・落下・完了フェーズではアームは上へ戻るだけ（景品追従しない）
  if(!['slip','release','fall','done'].includes(state.phase)){
    state.armX=getGripX();
  }

  // ── 1. 降下 ──
  if(state.phase==='descend'){
    state.shaftLen=Math.min(state.shaftLen+6, 330);
    if(state.shaftLen>=330){ state.phase='grip'; state.clawAngle=8; tick=0; }
  }

  // ── 2. 把持 ──
  if(state.phase==='grip'){
    state.clawAngle=Math.max(state.clawAngle-1, 3);
    if(tick>18){ state.phase='lift'; tick=0; }
  }

  // ── 3. 持ち上げ ──
  // 【設計方針】
  // isTooHeavy（把持力不足 or 重心ズレ過大）の場合:
  //   景品は浮かず、地面に接地したままピボット回転（片側だけ持ち上がる）
  //   限界角度を超えるとスリップ → アームが外れて景品が落下（ガシャン）
  // 通常時:
  //   景品を空中に持ち上げてリリース → 自由落下
  if(state.phase==='lift'){
    state.shaftLen=Math.max(state.shaftLen-5, 80);

    const F = getGrip();
    const W = getWeight();
    const dir = d > 0 ? -1 : 1;  // 把持点右→反時計、左→時計

    // 持ち上げ不可判定:
    //   把持力が重力の70%未満、またはトルク比が1.2超
    const isTooHeavy = (F < W * 0.7) || (ratio > 1.2);

    if(isTooHeavy){
      // ── ピボット（接地傾き）モード ──
      // 景品は地面に片側をつけたまま傾く。重心は回転角に応じて上昇。
      state.isPivot = true;
      state.velAngle += dir * ratio * 0.4;
      state.itemAngle += state.velAngle;
      state.itemAngle *= 0.85;  // 接地摩擦による強い減衰

      // 重心Yを回転角から計算（底面の一端を支点とした扇形運動）
      const rad = Math.abs(state.itemAngle) * Math.PI / 180;
      state.itemY = FLOOR_Y - (state.ih/2 * Math.cos(rad) + state.iw/2 * Math.sin(rad));

      // 限界角度を超えるとスリップ（アームがズルッと外れる）
      // 強度が高いほど限界角度が大きく、より粘る
      const slipAngle = 12 + state.power * 2.5;
      if(Math.abs(state.itemAngle) > slipAngle){
        // スリップ発動: アームを離して景品が勢いよく落下
        state.phase = 'slip'; tick = 0;
        state.clawAngle = 38;
        // スリップ時の速度: 傾いた方向に横滑りしながら落下
        state.velAngle = dir * -2.5;  // 傾き方向への回転慣性
        state.velY = 1.5;
        state.velX = dir * -1.5;      // 横方向にも滑る
      }
    } else {
      // ── 通常持ち上げ ──
      state.isPivot = false;
      if(ratio > 0.5){
        // 傾きながら持ち上げ
        state.velAngle += dir * ratio * 0.1;
        state.itemAngle += state.velAngle;
        state.itemAngle *= 0.97;
        state.itemY -= 2.5;
      } else {
        // 安定持ち上げ
        state.itemAngle *= 0.88; state.velAngle *= 0.7;
        state.itemY -= 3;
      }
      if(state.shaftLen <= 80){
        state.liftedY = state.itemY;
        // リリース移行: velAngle を傾き角ベースにリセット
        state.velAngle = state.itemAngle * (ratio > 0.5 ? 0.025 : 0.01);
        state.phase = 'release'; tick = 0;
        state.clawAngle = 30;
      }
    }
  }

  // ── 4. スリップ落下 ──
  // ピボット中に限界角を超え、アームが外れた直後の落下。
  // 景品は傾いた状態から横滑りしながら床に叩きつけられる。
  if(state.phase === 'slip'){
    state.clawAngle = Math.min(state.clawAngle + 3, 40);
    state.shaftLen  = Math.max(state.shaftLen - 6, 80);

    // 重力加速 + 横滑り
    state.velY += 0.65;
    state.itemY += state.velY;
    state.itemX += state.velX;
    state.velX *= 0.97;  // 横方向は徐々に減衰

    // 回転は慣性で継続（スリップ時は空気抵抗少なめ）
    state.velAngle *= 0.998;
    state.itemAngle += state.velAngle;

    // 接地判定
    const rad = Math.abs(state.itemAngle) * Math.PI / 180;
    const itemBottom = state.itemY + state.ih/2 * Math.cos(rad) + state.iw/2 * Math.sin(rad);
    if(itemBottom >= FLOOR_Y){
      state.itemY = FLOOR_Y - (state.ih/2 * Math.cos(rad) + state.iw/2 * Math.sin(rad));
      state.velY = 0; state.velX *= 0.3; state.velAngle *= -0.15;
      state.phase = 'done';
      endSim('SLIP / FAIL', 'danger');
    }
  }

  // ── 5. リリース（通常持ち上げ後）──
  // ツメを開きながらアームを上へ戻す。景品はtick>8から自由落下。
  if(state.phase==='release'){
    state.clawAngle = Math.min(state.clawAngle+2.5, 38);
    state.shaftLen  = Math.max(state.shaftLen-5, 80);

    if(tick > 8){
      state.velY += 0.45;
      state.itemY += state.velY;
      // 自由落下：外力なし、velAngle 一定で慣性回転のみ
      state.itemAngle += state.velAngle;
    }

    if(tick > 30){
      state.phase='fall'; tick=0;
    }
  }

  // ── 6. 落下（自由落下）──
  // 自由落下中は重力が重心に均等にかかるためトルクは発生しない。
  // 回転はリリース時に確定した velAngle のまま継続。
  if(state.phase==='fall'){
    state.velY += 0.55;
    state.itemY += state.velY;
    state.velAngle *= 0.998;
    state.itemAngle += state.velAngle;

    const rad2 = Math.abs(state.itemAngle) * Math.PI / 180;
    const itemBottom2 = state.itemY + state.ih/2 * Math.cos(rad2) + state.iw/2 * Math.sin(rad2);
    if(itemBottom2 >= FLOOR_Y){
      state.itemY = FLOOR_Y - (state.ih/2 * Math.cos(rad2) + state.iw/2 * Math.sin(rad2));
      state.velAngle *= -0.2;
      state.velY=0;
      state.phase='done';
      if(Math.abs(state.itemAngle)>20)    endSim('DROPPED','danger');
      else if(Math.abs(state.itemAngle)>5) endSim('TILTED','warn');
      else                                  endSim('SUCCESS','good');
    }
  }
}

function endSim(label,type){
  clearInterval(simTimer); simTimer=null;
  // 結果を2秒表示してから自動でidle状態に戻す（そのままSTARTが押せる）
  setTimeout(resetState, 2000);
  const bar=document.getElementById('result-bar');
  const detail=document.getElementById('result-detail');
  const cols={good:['#39ff14','#0a1a0a'],warn:['#ffd600','#1a1500'],danger:['#ff4081','#1a0010']};
  const [fg,bg]=cols[type];
  bar.style.cssText=`background:${bg};color:${fg};border:1px solid ${fg}`;
  bar.textContent=label;
  const msgs={
    SUCCESS:     '把持力がトルクを上回り\n持ち上げ後まっすぐ落下',
    TILTED:      '重心ずれで傾きながら\n持ち上げ→落下',
    DROPPED:     '転倒して落下\n強度UP or 中心を狙って',
    'SLIP / FAIL':'把持力不足または重心ズレ過大\n接地傾きからスリップ落下',
  };
  detail.style.color=fg; detail.textContent=msgs[label]||'';
}

// =====================================================================
// UI / CONTROLS
// =====================================================================
document.addEventListener('keydown', e=>{
  if(state.phase!=='idle') return;
  if(e.key==='ArrowLeft') { state.aimOffset=Math.max(-1,state.aimOffset-0.04); syncUI(); e.preventDefault(); }
  if(e.key==='ArrowRight'){ state.aimOffset=Math.min( 1,state.aimOffset+0.04); syncUI(); e.preventDefault(); }
  state.armX=getGripX();
  render();
});
canvas.addEventListener('click', e=>{
  if(state.phase!=='idle') return;
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(CW/rect.width);
  const offset=Math.max(-1,Math.min(1,(cx-state.itemX)/(state.iw*0.5)));
  state.aimOffset=parseFloat(offset.toFixed(2));
  state.armX=getGripX();
  syncUI(); render();
});
function syncUI(){
  document.getElementById('sl-aimx').value=state.aimOffset;
  document.getElementById('disp-aimx').textContent=(state.aimOffset>=0?'+':'')+state.aimOffset.toFixed(2);
}

document.getElementById('sl-power').addEventListener('input', e=>{
  state.power=parseInt(e.target.value);
  document.getElementById('disp-power').textContent=state.power;
  state.armX=getGripX();
  render();
});
document.getElementById('sl-aimx').addEventListener('input', e=>{
  state.aimOffset=parseFloat(e.target.value);
  document.getElementById('disp-aimx').textContent=(state.aimOffset>=0?'+':'')+state.aimOffset.toFixed(2);
  state.armX=getGripX();  // ← アーム位置を即時反映
  render();
});

['iw','ih'].forEach(key=>{
  document.getElementById('sl-'+key).addEventListener('input', e=>{
    state[key]=parseInt(e.target.value);
    document.getElementById('disp-'+key).textContent=state[key];
    document.getElementById('sel-shape').value='custom';
    state.itemY=FLOOR_Y-state.ih/2;
    state.armX=getGripX();
    render();
  });
});
document.getElementById('sl-mass').addEventListener('input', e=>{
  state.mass=parseFloat(e.target.value);
  document.getElementById('disp-mass').textContent=state.mass.toFixed(1);
  document.getElementById('sel-shape').value='custom';
  state.armX=getGripX();
  render();
});

const PRESETS={
  square:{ iw:70,  ih:70,  mass:0.3 },
  rect_h:{ iw:130, ih:60,  mass:0.4 },
  rect_v:{ iw:60,  ih:120, mass:0.6 },
  heavy: { iw:145, ih:68,  mass:1.0 },
};
document.getElementById('sel-shape').addEventListener('change', e=>{
  const p=PRESETS[e.target.value]; if(!p) return;
  state.iw=p.iw; state.ih=p.ih; state.mass=p.mass;
  document.getElementById('sl-iw').value=p.iw;
  document.getElementById('sl-ih').value=p.ih;
  document.getElementById('sl-mass').value=p.mass;
  document.getElementById('disp-iw').textContent=p.iw;
  document.getElementById('disp-ih').textContent=p.ih;
  document.getElementById('disp-mass').textContent=p.mass.toFixed(1);
  state.itemY=FLOOR_Y-state.ih/2;
  state.armX=getGripX();
  render();
});

document.getElementById('btn-start').addEventListener('click', startSim);
document.getElementById('btn-reset').addEventListener('click', resetState);

// 初期化
state.itemX=CW/2;
state.armX=getGripX();
render();
</script>
